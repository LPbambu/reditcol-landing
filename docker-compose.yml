version: "3.8"

services:
  creditcol-landing:
    build: .
    container_name: creditcol-landing
    ports:
      - "3010:80"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
