version: "3.8"

services:
  creditcol-landing:
    build: .
    container_name: creditcol-landing
    restart: unless-stopped
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  dokploy-network:
    external: true
